  window.addEventListener('DOMContentLoaded', function () {
    const loadBundle = function () {
      if (document.getElementById('artesting-bundle')) return;
      const script = document.createElement('script');
      script.id = 'artesting-bundle';
      script.src = 'bundle.js';
      script.defer = true;
      document.head.appendChild(script);
    };

    if (window.XR8 && typeof window.XR8.addCameraPipelineModule === 'function') {
      loadBundle();
    } else {
      window.addEventListener('xrloaded', loadBundle, { once: true });
      window.setTimeout(loadBundle, 5000);
    }
  });
